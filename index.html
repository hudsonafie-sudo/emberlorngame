<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emberlorn — A Dark Roguelike</title>
    <meta name="description" content="A dark pixel-art roguelike. 8 characters, 32 abilities, 30 waves of chaos. Wishlist on Steam.">
    <meta property="og:title" content="Emberlorn">
    <meta property="og:description" content="A dark pixel-art roguelike. 8 characters, 32 abilities, 30 waves of chaos.">
    <meta property="og:image" content="img/keyart.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="google" content="notranslate">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Language switcher -->
    <div class="lang-switcher">
        <button class="lang-btn" data-lang="pt" onclick="setLang('pt')" title="Português (BR)"><img src="img/flags/br.svg" alt="BR"></button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')" title="English"><img src="img/flags/en.svg" alt="EN"></button>
        <button class="lang-btn" data-lang="es" onclick="setLang('es')" title="Español"><img src="img/flags/es.svg" alt="ES"></button>
        <button class="lang-btn" data-lang="de" onclick="setLang('de')" title="Deutsch"><img src="img/flags/de.svg" alt="DE"></button>
        <button class="lang-btn" data-lang="ru" onclick="setLang('ru')" title="Русский"><img src="img/flags/ru.svg" alt="RU"></button>
        <button class="lang-btn" data-lang="ja" onclick="setLang('ja')" title="日本語"><img src="img/flags/ja.svg" alt="JA"></button>
        <button class="lang-btn" data-lang="zh" onclick="setLang('zh')" title="中文"><img src="img/flags/zh.svg" alt="ZH"></button>
        <button class="lang-btn" data-lang="ko" onclick="setLang('ko')" title="한국어"><img src="img/flags/ko.svg" alt="KO"></button>
    </div>

    <!-- Ember particles (full page) -->
    <canvas id="embers"></canvas>

    <!-- Floating spell decorations -->
    <div class="spell-decor spell-decor-1"><img src="img/spell_lightning.webp" alt=""></div>
    <div class="spell-decor spell-decor-2"><img src="img/spell_fire.webp" alt=""></div>
    <div class="spell-decor spell-decor-3"><img src="img/spell_scythe.webp" alt=""></div>
    <div class="spell-decor spell-decor-4"><img src="img/spell_ice.webp" alt=""></div>
    <div class="spell-decor spell-decor-5"><img src="img/spell_shadow.webp" alt=""></div>
    <div class="spell-decor spell-decor-6"><img src="img/spell_whirl.webp" alt=""></div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <img src="img/logo.png" alt="Emberlorn" class="hero-logo">
            <p class="tagline" data-i18n="tagline"></p>
            <div class="cta-buttons">
                <a href="https://store.steampowered.com/app/4585550/Emberlorn/" target="_blank" class="btn btn-steam">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.04 2 11.04c0 3.15 1.67 5.9 4.16 7.49l2.65-1.09a2.87 2.87 0 0 1 1.13-.23c.24 0 .47.03.7.08l1.96-2.84a4.31 4.31 0 0 1 4.31-4.32 4.31 4.31 0 0 1 4.31 4.32 4.31 4.31 0 0 1-4.31 4.31h-.1l-2.79 1.99c.02.18.04.36.04.55a3.22 3.22 0 0 1-3.22 3.22 3.24 3.24 0 0 1-3.17-2.6L2.57 19.3A10.04 10.04 0 0 0 12 22c5.52 0 10-4.04 10-9.04S17.52 2 12 2z"/></svg>
                    <span class="btn-steam-text">Wishlist on Steam</span>
                </a>
                <a href="https://hudafy.itch.io/emberlorn" target="_blank" class="btn btn-itch">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3.13 1.338C2.08 1.96 1.02 3.28 1.02 4.62v.89c0 1.67.87 2.95 2.02 3.26.13.03.26.05.4.05.97 0 1.76-.68 2.14-1.54.38.86 1.17 1.54 2.14 1.54.97 0 1.76-.68 2.14-1.54.38.86 1.17 1.54 2.14 1.54s1.76-.68 2.14-1.54c.38.86 1.17 1.54 2.14 1.54.97 0 1.76-.68 2.14-1.54.38.86 1.17 1.54 2.14 1.54.14 0 .27-.02.4-.05 1.15-.31 2.02-1.59 2.02-3.26v-.89c0-1.34-1.06-2.66-2.11-3.28C19.7.95 16.54.18 12 .18S4.3.95 3.13 1.34zM12 9.32c-.48.57-1.18.94-1.97.94-.34 0-.67-.07-.97-.2-.3.13-.63.2-.97.2-.79 0-1.49-.37-1.97-.94-.48.57-1.18.94-1.97.94-.1 0-.2-.01-.3-.02v8.04c0 .62.18 2.06 1.58 2.86l.02.01h1.46l.76-4.11c.18-.96.86-1.58 1.76-1.58h3.14c.9 0 1.58.62 1.76 1.58l.76 4.11h1.46l.02-.01c1.4-.8 1.58-2.24 1.58-2.86v-8.04c-.1.01-.2.02-.3.02-.79 0-1.49-.37-1.97-.94-.48.57-1.18.94-1.97.94-.34 0-.67-.07-.97-.2-.3.13-.63.2-.97.2-.79 0-1.49-.37-1.97-.94z"/></svg>
                    <span class="btn-itch-text">Play Demo Free</span>
                </a>
            </div>
        </div>
        <div class="scroll-hint">&#x25BC;</div>
    </section>

    <!-- Trailer -->
    <section class="trailer" id="trailer">
        <div class="section-inner">
            <div class="video-wrap fade-in">
                <div class="video-placeholder" id="video-placeholder">
                    <img src="img/keyart.png" alt="Emberlorn trailer" class="video-thumb">
                    <div class="play-btn">&#9654;</div>
                    <p class="video-soon">Trailer coming soon</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Characters showcase -->
    <section class="characters">
        <div class="section-inner">
            <h2 class="fade-in" data-i18n="champion"></h2>
            <div class="char-row fade-in">
                <div class="char-sprite" data-sheet="img/char_nyx.webp" data-name="Nyx">
                    <div class="char-anim"></div>
                    <span class="char-name">Nyx</span>
                </div>
                <div class="char-sprite" data-sheet="img/char_gorath.webp" data-name="Gorath">
                    <div class="char-anim"></div>
                    <span class="char-name">Gorath</span>
                </div>
                <div class="char-sprite" data-sheet="img/char_riven.webp" data-name="Riven">
                    <div class="char-anim"></div>
                    <span class="char-name">Riven</span>
                </div>
                <div class="char-sprite" data-sheet="img/char_malachar.webp" data-name="Malachar">
                    <div class="char-anim"></div>
                    <span class="char-name">Malachar</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Features -->
    <section class="features">
        <div class="section-inner">
            <div class="feature-grid">
                <div class="feature fade-in">
                    <img src="img/feat_chars.webp" alt="" class="feature-spell">
                    <h3 data-i18n="f1t"></h3>
                    <p data-i18n="f1d"></p>
                </div>
                <div class="feature fade-in">
                    <img src="img/spell_lightning.webp" alt="" class="feature-spell">
                    <h3 data-i18n="f2t"></h3>
                    <p data-i18n="f2d"></p>
                </div>
                <div class="feature fade-in">
                    <img src="img/spell_scythe.webp" alt="" class="feature-spell">
                    <h3 data-i18n="f3t"></h3>
                    <p data-i18n="f3d"></p>
                </div>
                <div class="feature fade-in">
                    <img src="img/feat_equip.webp" alt="" class="feature-spell">
                    <h3 data-i18n="f4t"></h3>
                    <p data-i18n="f4d"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Screenshots -->
    <section class="screenshots" id="screenshots">
        <div class="section-inner">
            <h2 class="fade-in" data-i18n="ss"></h2>
            <div class="ss-grid">
                <a href="img/ss1.jpg" class="ss-item fade-in" target="_blank"><img src="img/ss1.jpg" alt="Combat gameplay" loading="lazy"></a>
                <a href="img/ss2.jpg" class="ss-item fade-in" target="_blank"><img src="img/ss2.jpg" alt="Boss arena" loading="lazy"></a>
                <a href="img/ss3.jpg" class="ss-item fade-in" target="_blank"><img src="img/ss3.jpg" alt="Boss loot" loading="lazy"></a>
                <a href="img/ss4.jpg" class="ss-item fade-in" target="_blank"><img src="img/ss4.jpg" alt="Hub area" loading="lazy"></a>
                <a href="img/ss5.jpg" class="ss-item fade-in" target="_blank"><img src="img/ss5.jpg" alt="Blacksmith" loading="lazy"></a>
            </div>
        </div>
    </section>

    <!-- Bottom CTA -->
    <section class="bottom-cta">
        <div class="section-inner fade-in">
            <img src="img/logo.png" alt="Emberlorn" class="bottom-logo">
            <p class="bottom-tagline" data-i18n="cta"></p>
            <div class="cta-buttons">
                <a href="https://store.steampowered.com/app/4585550/Emberlorn/" target="_blank" class="btn btn-steam">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.04 2 11.04c0 3.15 1.67 5.9 4.16 7.49l2.65-1.09a2.87 2.87 0 0 1 1.13-.23c.24 0 .47.03.7.08l1.96-2.84a4.31 4.31 0 0 1 4.31-4.32 4.31 4.31 0 0 1 4.31 4.32 4.31 4.31 0 0 1-4.31 4.31h-.1l-2.79 1.99c.02.18.04.36.04.55a3.22 3.22 0 0 1-3.22 3.22 3.24 3.24 0 0 1-3.17-2.6L2.57 19.3A10.04 10.04 0 0 0 12 22c5.52 0 10-4.04 10-9.04S17.52 2 12 2z"/></svg>
                    <span class="btn-steam-text">Wishlist on Steam</span>
                </a>
                <a href="https://hudafy.itch.io/emberlorn" target="_blank" class="btn btn-itch">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3.13 1.338C2.08 1.96 1.02 3.28 1.02 4.62v.89c0 1.67.87 2.95 2.02 3.26.13.03.26.05.4.05.97 0 1.76-.68 2.14-1.54.38.86 1.17 1.54 2.14 1.54.97 0 1.76-.68 2.14-1.54.38.86 1.17 1.54 2.14 1.54s1.76-.68 2.14-1.54c.38.86 1.17 1.54 2.14 1.54.97 0 1.76-.68 2.14-1.54.38.86 1.17 1.54 2.14 1.54.14 0 .27-.02.4-.05 1.15-.31 2.02-1.59 2.02-3.26v-.89c0-1.34-1.06-2.66-2.11-3.28C19.7.95 16.54.18 12 .18S4.3.95 3.13 1.34zM12 9.32c-.48.57-1.18.94-1.97.94-.34 0-.67-.07-.97-.2-.3.13-.63.2-.97.2-.79 0-1.49-.37-1.97-.94-.48.57-1.18.94-1.97.94-.1 0-.2-.01-.3-.02v8.04c0 .62.18 2.06 1.58 2.86l.02.01h1.46l.76-4.11c.18-.96.86-1.58 1.76-1.58h3.14c.9 0 1.58.62 1.76 1.58l.76 4.11h1.46l.02-.01c1.4-.8 1.58-2.24 1.58-2.86v-8.04c-.1.01-.2.02-.3.02-.79 0-1.49-.37-1.97-.94-.48.57-1.18.94-1.97.94-.34 0-.67-.07-.97-.2-.3.13-.63.2-.97.2-.79 0-1.49-.37-1.97-.94z"/></svg>
                    <span class="btn-itch-text">Play Demo Free</span>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="section-inner">
            <p>&copy; 2026 Hudson Borges. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
